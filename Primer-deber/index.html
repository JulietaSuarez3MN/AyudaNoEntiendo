<body>
    <div class="form-container">
        <form action="" class="login">
            <h1 class="login-title">Crear Cuenta</h1>
            <Label for="" class="login-label">Nombre y Apellido</Label>
            <input type="text" class="login-user">

            <Label for="" class="login-label">Email</Label>
            <input type="email" class="login-user">

            <Label for="" class="login-label">Contrasena</Label>
            <input type="password" class="login-user">

            <Label for="" class="login-label">Repetir Contrasena</Label>
            <input type="password" class="login-user">

          <div class="fecha-container">
            <label for="" class="fecha-container">Fecha de nacimiento</label>
            <input type="number" placeholder="Día" min="1" max="31" class="fecha-input">
            <input type="number" placeholder="Mes" min="1" max="12" class="fecha-input">
            <input type="number" placeholder="Año" min="1900" max="2026" class="fecha-input">
        </div>


            <button type="submit" class="login-button">Guardar</button>
    </form>
    </div>
